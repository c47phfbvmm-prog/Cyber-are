<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Typing Trainer</title>
<style>
body{
  background:#0b0f14;
  color:#00ff9c;
  font-family:monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.app{
  width:820px;
  background:#111;
  padding:25px;
  border-radius:14px;
}
h1{text-align:center;margin:0 0 10px;}
.controls{display:flex;gap:10px;}
select,button,input{
  flex:1;
  padding:10px;
  background:#000;
  color:#00ff9c;
  border:1px solid #333;
}
.command{
  margin-top:20px;
  font-size:18px;
  line-height:1.6;
  word-wrap:break-word;
}
.correct{color:#00ff00;}
.wrong{color:#ff4c4c;}
.pending{color:#555;}
.stats{margin-top:10px;font-size:14px;}
.progress{
  margin-top:10px;
  height:8px;
  background:#222;
  border-radius:6px;
  overflow:hidden;
}
.bar{height:100%;width:0%;background:#00c8ff;}
</style>
</head>
<body>

<div class="app">
<h1>Cyber Typing Trainer</h1>

<div class="controls">
<select id="tool">
  <option value="linux">Linux Basics</option>
  <option value="nmap">Nmap</option>
  <option value="sqlmap">SQLmap</option>
  <option value="metasploit">Metasploit</option>
  <option value="meterpreter">Meterpreter</option>
</select>

<button id="resetBtn">Restart</button>
</div>

<div class="command" id="command"></div>
<input id="input" placeholder="Type the command exactly..." autocomplete="off">
<div class="progress"><div class="bar" id="bar"></div></div>
<div class="stats" id="stats"></div>
</div>

<script>
/* ===== PROGRESSIVE COMMANDS ===== */
const commands = {
linux: [
  // Easy
  "whoami",
  "pwd",
  "ls",

  // Medium
  "ls -la",
  "cd /var/www/html",
  "ps aux",

  // Hard
  "find / -type f -name passwd 2>/dev/null",
  "chmod +x exploit.sh",
  "sudo -l"
],

nmap: [
  // Easy
  "nmap 192.168.1.1",
  "nmap -sS 192.168.1.1",

  // Medium
  "nmap -sV 192.168.1.1",
  "nmap -p 22,80,443 192.168.1.1",

  // Hard
  "nmap -A 192.168.1.1",
  "nmap -sS -sV -O -p 1-65535 192.168.1.1"
],

sqlmap: [
  // Easy
  "sqlmap -u http://site.com/index.php?id=1",

  // Medium
  "sqlmap -u http://site.com/index.php?id=1 --dbs",
  "sqlmap -u http://site.com/index.php?id=1 --tables",

  // Hard
  "sqlmap -u http://site.com/index.php?id=1 --dump",
  "sqlmap --os-shell -u http://site.com/index.php?id=1"
],

metasploit: [
  // Easy
  "msfconsole",
  "search smb",

  // Medium
  "use exploit/windows/smb/ms17_010_eternalblue",
  "show options",

  // Hard
  "set RHOSTS 192.168.1.10",
  "set PAYLOAD windows/x64/meterpreter/reverse_tcp",
  "exploit"
],

meterpreter: [
  // Easy
  "sysinfo",
  "getuid",

  // Medium
  "ps",
  "shell",

  // Hard
  "hashdump",
  "keyscan_start",
  "keyscan_dump"
]
};

/* ===== CORE LOGIC ===== */
let index = 0;
let target = "";
let typed = "";
let locked = false;

function loadCommand(){
  const tool = document.getElementById("tool").value;
  const list = commands[tool];

  if(index >= list.length){
    document.getElementById("stats").innerHTML =
      "🎉 Tool Complete – You finished all levels";
    return;
  }

  target = list[index];
  typed = "";
  locked = false;
  document.getElementById("input").value = "";
  render();
  document.getElementById("bar").style.width =
    `${(index/list.length)*100}%`;
}

function render(){
  let html="";
  for(let i=0;i<target.length;i++){
    if(i<typed.length){
      html += typed[i] === target[i]
        ? `<span class="correct">${target[i]}</span>`
        : `<span class="wrong">${target[i]}</span>`;
    }else{
      html += `<span class="pending">${target[i]}</span>`;
    }
  }
  document.getElementById("command").innerHTML = html;
}

document.getElementById("input").addEventListener("input", e=>{
  if(locked) return;
  typed = e.target.value;
  render();

  if(typed === target){
    locked = true;
    index++;
    setTimeout(loadCommand, 500);
  }
});

document.getElementById("resetBtn").onclick = ()=>{
  index = 0;
  document.getElementById("stats").textContent = "";
  loadCommand();
};

document.getElementById("tool").onchange = ()=>{
  index = 0;
  document.getElementById("stats").textContent = "";
  loadCommand();
};

loadCommand();
</script>

</body>
</html>
