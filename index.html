<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cyber Typing Trainer</title>
<style>
  body{
    background:#0b0f14;
    color:#00ff9c;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    display:flex; justify-content:center; align-items:center;
    height:100vh; margin:0; padding:16px;
  }
  .app{
    width:min(900px, 100%);
    background:#111;
    padding:22px;
    border-radius:14px;
    border:1px solid #1f1f1f;
  }
  h1{ text-align:center; margin:0 0 10px; font-size:20px; }
  .topline{
    display:flex; gap:10px; align-items:center; justify-content:space-between;
    flex-wrap:wrap; margin-bottom:10px;
  }
  .controls{ display:flex; gap:10px; flex-wrap:wrap; }
  select, button, input{
    padding:10px;
    background:#000;
    color:#00ff9c;
    border:1px solid #333;
    border-radius:10px;
    font-family:inherit;
  }
  select{ min-width: 180px; }
  button{ cursor:pointer; }
  button:active{ transform: translateY(1px); }
  input{
    width:100%;
    margin-top:12px;
    font-size:16px;
  }
  .command{
    margin-top:14px;
    font-size:18px;
    line-height:1.7;
    word-wrap:break-word;
    min-height: 56px;
  }
  .correct{ color:#00ff00; }
  .wrong{ color:#ff4c4c; }
  .pending{ color:#555; }
  .progress{
    margin-top:12px;
    height:8px;
    background:#222;
    border-radius:6px;
    overflow:hidden;
  }
  .bar{ height:100%; width:0%; background:#00c8ff; }
  .stats{
    margin-top:10px;
    font-size:13px;
    color:#c7ffe8;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .muted{ color:#6fd8b4; opacity:.85; }
  .warn{ color:#ffcf66; }
</style>
</head>
<body>
  <div class="app">
    <h1>Cyber Typing Trainer</h1>

    <div class="topline">
      <div class="controls">
        <select id="tool">
          <option value="linux">Linux Basics</option>
          <option value="nmap">Nmap</option>
          <option value="sqlmap">SQLmap</option>
          <option value="metasploit">Metasploit</option>
          <option value="meterpreter">Meterpreter</option>
        </select>

        <select id="level">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>

        <button id="skipBtn" title="Skip this command">Skip</button>
        <button id="restartBtn" title="Restart from beginning">Restart</button>
      </div>

      <div class="muted" id="levelBadge">Difficulty: Easy</div>
    </div>

    <div class="command" id="command"></div>
    <input id="input" placeholder="Type the command exactly..." autocomplete="off" autocapitalize="off" spellcheck="false" />

    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="stats" id="stats"></div>
  </div>

<script>
/* =========================
   Always Fresh Start + Manual Level
   - No localStorage
   - No randomness
   - Ordered commands per tool/level
   ========================= */

const TOOL_DATA = {
  linux: {
    easy: ["whoami","pwd","ls","id"],
    medium: ["ls -la","cd /var/www/html","history | tail","ps aux"],
    hard: ["find / -type f -name passwd 2>/dev/null","chmod +x exploit.sh","du -sh *","sudo -l"]
  },
  nmap: {
    easy: ["nmap 192.168.1.1","nmap -sS 192.168.1.1"],
    medium: ["nmap -sV 192.168.1.1","nmap -p 22,80,443 192.168.1.1","nmap -T4 -Pn 192.168.1.1"],
    hard: ["nmap -A 192.168.1.1","nmap -p- 192.168.1.1","nmap --script vuln 192.168.1.1","nmap -sS -sV -O -p 1-65535 192.168.1.1","nmap -oN scan.txt 192.168.1.1"]
  },
  sqlmap: {
    easy: ["sqlmap -u http://target.local/index.php?id=1"],
    medium: ["sqlmap -u http://target.local/index.php?id=1 --dbs","sqlmap -u http://target.local/index.php?id=1 --tables","sqlmap -r request.txt --dbs","sqlmap -u http://target.local/index.php?id=1 --batch"],
    hard: ["sqlmap -u http://target.local/index.php?id=1 --columns","sqlmap -u http://target.local/index.php?id=1 --dump","sqlmap -u http://target.local/index.php?id=1 --risk=3 --level=5","sqlmap --tamper=space2comment -u http://target.local/index.php?id=1"]
  },
  metasploit: {
    easy: ["msfconsole","help","version","search scanner"],
    medium: ["use auxiliary/scanner/portscan/tcp","show options","set RHOSTS 192.168.1.0/24","set PORTS 22,80,443","run"],
    hard: ["search type:auxiliary name:smb","use auxiliary/scanner/smb/smb_version","set THREADS 20","set RHOSTS 192.168.1.0/24","run","sessions","sessions -h"]
  },
  meterpreter: {
    easy: ["sysinfo","getuid","pwd","ls"],
    medium: ["ps","shell","cd ..","background"],
    hard: ["upload file.txt","download secret.txt","screenshot","keyscan_start","keyscan_dump","keyscan_stop"]
  }
};

const elTool = document.getElementById("tool");
const elLevel= document.getElementById("level");
const elCmd  = document.getElementById("command");
const elInput= document.getElementById("input");
const elBar  = document.getElementById("bar");
const elStats= document.getElementById("stats");
const elBadge= document.getElementById("levelBadge");
const btnSkip= document.getElementById("skipBtn");
const btnRestart= document.getElementById("restartBtn");

let list = [];
let idx = 0;
let locked = false;

let prevTyped = "";
let totalKeys = 0;
let wrongKeys = 0;

let startTime = 0;
let wpmSum = 0;
let wpmCount = 0;
let skippedCount = 0;

function setBadge(){
  const lv = elLevel.value;
  elBadge.textContent = `Difficulty: ${lv.charAt(0).toUpperCase() + lv.slice(1)}`;
}

function accuracyPct(){
  if(totalKeys <= 0) return 100;
  return Math.max(0, Math.round(100 - (wrongKeys / totalKeys) * 100));
}
function avgWpm(){
  if(wpmCount <= 0) return 0;
  return Math.max(0, Math.round(wpmSum / wpmCount));
}

function loadListFresh(){
  // ALWAYS FRESH: reset everything
  idx = 0;
  locked = false;
  prevTyped = "";
  totalKeys = 0;
  wrongKeys = 0;
  wpmSum = 0;
  wpmCount = 0;
  skippedCount = 0;

  const tool = elTool.value;
  const level = elLevel.value;
  list = TOOL_DATA[tool][level].slice(); // ordered
  elStats.textContent = "";
  elInput.disabled = false;
  elInput.value = "";
  startTime = Date.now();
  setBadge();
  render();
}

function currentTarget(){
  return list[idx] || null;
}

function render(){
  const target = currentTarget();
  if(!target){
    elCmd.innerHTML = `<span class="correct">🎉 Level Complete</span>`;
    elInput.value = "";
    elInput.disabled = true;
    locked = true;
    elBar.style.width = "100%";
    elStats.innerHTML = `
      <span>Done: ${list.length}/${list.length}</span>
      <span class="muted">Skipped: ${skippedCount}</span>
      <span class="muted">Accuracy: ${accuracyPct()}%</span>
      <span class="muted">Avg WPM: ${avgWpm()}</span>
      <span class="warn">Restart to train again</span>
    `;
    return;
  }

  const typed = elInput.value;

  let html = "";
  for(let i=0;i<target.length;i++){
    if(i < typed.length){
      html += (typed[i] === target[i])
        ? `<span class="correct">${target[i]}</span>`
        : `<span class="wrong">${target[i]}</span>`;
    } else {
      html += `<span class="pending">${target[i]}</span>`;
    }
  }
  elCmd.innerHTML = html;

  const pct = Math.min(100, Math.round((idx / list.length) * 100));
  elBar.style.width = `${pct}%`;

  elStats.innerHTML = `
    <span>Step: ${Math.min(idx+1, list.length)}/${list.length}</span>
    <span class="muted">Skipped: ${skippedCount}</span>
    <span class="muted">Accuracy: ${accuracyPct()}%</span>
    <span class="muted">Avg WPM: ${avgWpm()}</span>
  `;
}

function advance(reason){
  const target = currentTarget();
  if(!target) return;

  if(reason === "done"){
    const seconds = Math.max(0.2, (Date.now() - startTime) / 1000);
    const wpm = ((target.length / 5) / (seconds / 60));
    wpmSum += wpm;
    wpmCount += 1;
  } else if(reason === "skip"){
    skippedCount += 1;
  }

  idx += 1;
  locked = false;
  prevTyped = "";
  elInput.value = "";
  startTime = Date.now();
  render();
}

function onInput(){
  if(locked) return;
  const target = currentTarget();
  if(!target) return;

  const typed = elInput.value;

  // count only newly added keystrokes
  if(typed.length > prevTyped.length){
    for(let i=prevTyped.length; i<typed.length; i++){
      totalKeys += 1;
      if(target[i] !== typed[i]) wrongKeys += 1;
    }
  }
  prevTyped = typed;

  render();

  if(typed === target){
    locked = true;
    setTimeout(()=>advance("done"), 300);
  }
}

function skip(){
  if(locked) return;
  if(!currentTarget()) return;
  locked = true;
  setTimeout(()=>advance("skip"), 150);
}

function restart(){
  loadListFresh();
}

// Events
elInput.addEventListener("input", onInput);
btnSkip.addEventListener("click", skip);
btnRestart.addEventListener("click", restart);

elTool.addEventListener("change", ()=>{
  // Always fresh start on tool change
  loadListFresh();
});

elLevel.addEventListener("change", ()=>{
  // Always fresh start on level change
  setBadge();
  loadListFresh();
});

// Boot
loadListFresh();
</script>
</body>
</html>
