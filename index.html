<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة 🎃</title>
    <style>
        body { background-color: #000; color: #fff; text-align: center; font-family: 'Arial', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow: hidden; }
        
        /* تصميم الزر */
        #btn { padding: 20px 40px; font-size: 24px; cursor: pointer; background: #800000; border: 2px solid #ff0000; color: white; border-radius: 50px; box-shadow: 0 0 20px #ff0000; transition: 0.2s; }
        #btn:active { transform: scale(0.9); }

        /* تأثير الاهتزاز (Animation) */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* حاوية الرعب */
        #scaryContainer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 1000;
        }

        /* الصورة المرعبة مع تفعيل الاهتزاز */
        #scaryImg {
            width: 100%; height: 100%; object-fit: cover;
            animation: shake 0.1s infinite; /* اهتزاز سريع جداً */
        }

        /* وميض أحمر للخلفية */
        .flash { animation: flash-red 0.1s infinite; }
        @keyframes flash-red {
            0%, 100% { background-color: black; }
            50% { background-color: #400000; }
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>هل أنت مستعد للتحدي؟ 👻</h1>
        <p>اضغط الزر وشاهد ما سيحدث...</p>
        <button id="btn" onclick="goScary()">ابدأ الآن</button>
    </div>

    <div id="scaryContainer">
        <img id="scaryImg" src="https://i.imgur.com/vH9Xv9H.jpg">
        <audio id="scream" src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Scream&filename=24/248317-062e783c-1b6a-4d33-a0e2-e1a5f9730704.mp3"></audio>
    </div>

    <script>
        function goScary() {
            // تشغيل الصوت
            document.getElementById('scream').play();
            
            // إظهار المحتوى وإضافة الوميض
            document.getElementById('scaryContainer').style.display = 'block';
            document.body.classList.add('flash');

            // محاولة إجبار المتصفح على وضع ملء الشاشة (يحتاج تفاعل مستخدم)
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }
    </script>
</body>
</html>
